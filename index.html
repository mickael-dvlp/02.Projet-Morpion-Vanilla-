<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morpion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Morpion</h1>
      <div class="modes">
        <button id="pvp-btn" class="active">Joueur vs Joueur</button>
        <button id="pvc-btn">Joueur vs Ordi</button>
      </div>
    </header>

    <main>
      <!-- Carte score Joueur 1 (X) -->
      <div class="score-card score-card--x">
        <span class="score-symbol">X</span>
        <span class="score-label">Joueur 1</span>
        <span id="score-x" class="score-value">0</span>
      </div>

      <!-- Zone de jeu centrale -->
      <section class="game-container">
        <div id="status">Tour du Joueur X</div>
        <div class="grid" id="grid">
          <div class="cell" data-index="0"></div>
          <div class="cell" data-index="1"></div>
          <div class="cell" data-index="2"></div>
          <div class="cell" data-index="3"></div>
          <div class="cell" data-index="4"></div>
          <div class="cell" data-index="5"></div>
          <div class="cell" data-index="6"></div>
          <div class="cell" data-index="7"></div>
          <div class="cell" data-index="8"></div>
        </div>
        <button id="reset-btn">Nouvelle partie</button>
      </section>

      <!-- Carte score Joueur 2 (O) -->
      <div class="score-card score-card--o">
        <span class="score-symbol">O</span>
        <span id="label-o" class="score-label">Joueur 2</span>
        <span id="score-o" class="score-value">0</span>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
